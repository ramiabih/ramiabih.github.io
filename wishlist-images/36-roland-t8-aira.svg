<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 630" width="630" height="630">
  <rect width="630" height="630" fill="#1a1a1a"/>
  <rect x="40" y="160" width="550" height="310" rx="16" fill="#2a2a2a"/>

  <!-- Roland logo text -->
  <text x="315" y="235" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="6" fill="#e0522a" text-anchor="middle" dominant-baseline="middle">ROLAND</text>

  <!-- AIRA label -->
  <text x="315" y="275" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="4" fill="#888888" text-anchor="middle" dominant-baseline="middle">AIRA COMPACT</text>

  <!-- T-8 large text -->
  <text x="315" y="345" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="80" font-weight="700" letter-spacing="-2" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">T-8</text>

  <!-- Beat Machine subtitle -->
