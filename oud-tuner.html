<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oud Tuner — Rami Abi Habib</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="oud-tuner-styles.css">
</head>
<body>
    <header>
        <h1><a href="index.html" style="text-decoration:none;color:inherit">Rami Abi Habib</a></h1>
        <p>Oud Tuner</p>
    </header>

    <main class="tuner-main">
        <div class="controls-bar">
            <div class="preset-bar">
                <span class="preset-label">Preset:</span>
                <button class="preset-btn" data-preset="default">Standard</button>
                <button class="preset-btn" data-preset="arabic">Arabic</button>
                <button class="preset-btn" data-preset="turkish">Turkish</button>
                <button class="preset-btn" data-preset="guitar">Guitar</button>
            </div>
            <div class="tone-bar">
                <label class="tone-label" for="tone-select">Tone:</label>
                <select class="tone-select" id="tone-select">
                    <option value="oud">Oud</option>
                    <option value="guitar">Guitar</option>
                    <option value="reference">Reference</option>
                </select>
            </div>
        </div>

        <div class="tuner-display">
            <div class="display-note" id="display-note">—</div>
            <div class="display-cents" id="display-cents"></div>
            <div class="meter-wrap">
                <div class="meter-bar">
                    <div class="meter-needle" id="meter-needle" style="left:50%"></div>
                </div>
                <div class="meter-scale">
                    <span>♭ −50</span>
                    <span>0 cents</span>
                    <span>+50 ♯</span>
                </div>
            </div>
            <div class="display-status" id="display-status">Click a string to play a reference tone</div>
        </div>

        <button class="listen-btn" id="listen-btn">Start Listening</button>

        <section class="strings-section">
            <h3>Strings <span class="strings-hint">type a note (e.g. D3) or Hz (e.g. 146.8)</span></h3>
            <div class="strings-list" id="strings-list"></div>
        </section>

        <p class="tuner-note">
            Click <strong>Start Listening</strong> to tune using your microphone — the tuner detects pitch in real time.
            Click <strong>&#9654; Play</strong> to hear the reference tone for any string.
        </p>
    </main>

    <footer></footer>

    <script>
        // ===== NOTE OPTIONS (for mobile selects) =====
        const NOTE_BASE  = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
        const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

        const NOTE_OPTIONS = [];
        for (let midi = 24; midi <= 84; midi++) {
            const semi   = ((midi % 12) + 12) % 12;
            const octave = Math.floor(midi / 12) - 1;
            const note   = NOTE_NAMES[semi] + octave;
            const freq   = 440 * Math.pow(2, (midi - 69) / 12);
            NOTE_OPTIONS.push({ midi, note, freq });
        }
        const NOTE_OPTIONS_HTML = NOTE_OPTIONS.map(o =>
            `<option value="${o.midi}">${o.note}</option>`
        ).join('');

        // ===== TUNINGS =====
        const DEFAULT_TUNING = [
            { string: 1, note: 'F4',  freq: 349.23 },
            { string: 2, note: 'C4',  freq: 261.63 },
            { string: 3, note: 'G3',  freq: 196.00 },
            { string: 4, note: 'D3',  freq: 146.83 },
            { string: 5, note: 'A2',  freq: 110.00 },
            { string: 6, note: 'F2',  freq: 87.31  },
        ];

        const PRESETS = {
            default: DEFAULT_TUNING,
            arabic: [
                { string: 1, note: 'C4',  freq: 261.63 },
                { string: 2, note: 'G3',  freq: 196.00 },
                { string: 3, note: 'D3',  freq: 146.83 },
                { string: 4, note: 'A2',  freq: 110.00 },
                { string: 5, note: 'F2',  freq: 87.31  },
                { string: 6, note: 'C2',  freq: 65.41  },
            ],
            turkish: [
                { string: 1, note: 'D4',  freq: 293.66 },
                { string: 2, note: 'A3',  freq: 220.00 },
                { string: 3, note: 'E3',  freq: 164.81 },
                { string: 4, note: 'B2',  freq: 123.47 },
                { string: 5, note: 'F#2', freq: 92.50  },
                { string: 6, note: 'C#2', freq: 69.30  },
            ],
            guitar: [
                { string: 1, note: 'E4',  freq: 329.63 },
                { string: 2, note: 'B3',  freq: 246.94 },
                { string: 3, note: 'G3',  freq: 196.00 },
                { string: 4, note: 'D3',  freq: 146.83 },
                { string: 5, note: 'A2',  freq: 110.00 },
                { string: 6, note: 'E2',  freq: 82.41  },
            ],
        };

        // ===== STATE =====
        let strings     = DEFAULT_TUNING.map(s => ({ ...s }));
        let isListening = false;
        let audioCtx    = null;
        let analyser    = null;
        let micStream   = null;
        let rafId       = null;

        // ----- Stabilization state (makes it behave like a tuner, not a
        //       raw pitch detector) -----
        let pitchBuf      = [];   // recent accepted frequencies (median window)
        let displayFreq   = 0;    // EMA-smoothed frequency actually shown
        let needlePos     = 50;   // EMA-smoothed needle position (percent)
        let lastValidTime = 0;    // performance.now() of last accepted frame
        const PITCH_WINDOW = 8;   // frames kept for the median (~130 ms)
        const CLARITY_MIN  = 0.80;// min normalized autocorrelation peak to trust
        const HOLD_MS      = 600; // keep showing the last note through dropouts
        const FREQ_EMA     = 0.25;// how fast the reading eases toward the median
        const NEEDLE_EMA   = 0.18;// how fast the needle eases (≈150 ms settle)
        const RMS_GATE     = 0.012;

        function median(arr) {
            const a = arr.slice().sort((x, y) => x - y);
            const m = a.length >> 1;
            return a.length % 2 ? a[m] : (a[m - 1] + a[m]) / 2;
        }

        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function currentTone() {
            return document.getElementById('tone-select').value;
        }

        // ===== SOUND SYNTHESIS =====

        function addPluck(ctx, dest, freq, duration, brightness, amp) {
            const bufSize = Math.floor(ctx.sampleRate * duration);
            const buf     = ctx.createBuffer(1, bufSize, ctx.sampleRate);
            const data    = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);

            const src = ctx.createBufferSource();
            src.buffer = buf;

            const bpf = ctx.createBiquadFilter();
            bpf.type            = 'bandpass';
            bpf.frequency.value = freq * brightness;
            bpf.Q.value         = 1.2;

            const g = ctx.createGain();
            g.gain.setValueAtTime(amp, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

            src.connect(bpf);
            bpf.connect(g);
            g.connect(dest);
            src.start(ctx.currentTime);
            src.stop(ctx.currentTime + duration);
        }

        function addPartial(ctx, dest, freq, mult, amp, attack, decay) {
            const osc = ctx.createOscillator();
            const g   = ctx.createGain();
            osc.type            = 'sine';
            osc.frequency.value = freq * mult;
            g.gain.setValueAtTime(0, ctx.currentTime);
            g.gain.linearRampToValueAtTime(amp, ctx.currentTime + attack);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + attack + decay);
            osc.connect(g);
            g.connect(dest);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + attack + decay);
        }

        function playOud(freq) {
            const ctx    = getAudioCtx();
            const master = ctx.createGain();
            master.gain.value = 0.85;
            master.connect(ctx.destination);

            addPluck(ctx, master, freq, 0.035, 2.5, 0.6);
            addPartial(ctx, master, freq, 1, 0.55, 0.008, 2.5);
            addPartial(ctx, master, freq, 2, 0.22, 0.008, 1.8);
            addPartial(ctx, master, freq, 3, 0.10, 0.010, 1.2);
            addPartial(ctx, master, freq, 4, 0.05, 0.012, 0.8);
        }

        function playGuitar(freq) {
            const ctx    = getAudioCtx();
            const master = ctx.createGain();
            master.gain.value = 0.80;
            master.connect(ctx.destination);

            addPluck(ctx, master, freq, 0.050, 4.0, 0.5);
            addPartial(ctx, master, freq, 1, 0.50, 0.006, 4.0);
            addPartial(ctx, master, freq, 2, 0.25, 0.006, 3.0);
            addPartial(ctx, master, freq, 3, 0.14, 0.008, 2.0);
            addPartial(ctx, master, freq, 4, 0.08, 0.010, 1.4);
            addPartial(ctx, master, freq, 5, 0.04, 0.012, 1.0);
            addPartial(ctx, master, freq, 6, 0.02, 0.014, 0.7);
        }

        function playReference(freq) {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const g   = ctx.createGain();
            osc.type            = 'sine';
            osc.frequency.value = freq;
            g.gain.setValueAtTime(0, ctx.currentTime);
            g.gain.linearRampToValueAtTime(0.7, ctx.currentTime + 0.02);
            g.gain.setValueAtTime(0.7, ctx.currentTime + 1.8);
            g.gain.linearRampToValueAtTime(0, ctx.currentTime + 2.2);
            osc.connect(g);
            g.connect(ctx.destination);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 2.2);
        }

        function playTone(freq) {
            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') ctx.resume();
            const tone = currentTone();
            if (tone === 'guitar')    playGuitar(freq);
            else if (tone === 'reference') playReference(freq);
            else                      playOud(freq);
        }

        // ===== NOTE UTILITIES =====
        function noteToMidi(note) {
            const m = note.match(/^([A-Ga-g])([#b]?)(\d)$/);
            if (!m) return null;
            let semi = NOTE_BASE[m[1].toUpperCase()];
            if (m[2] === '#') semi++;
            if (m[2] === 'b') semi--;
            semi = ((semi % 12) + 12) % 12;
            return (parseInt(m[3]) + 1) * 12 + semi;
        }

        function freqToNote(freq) {
            const midi   = Math.round(12 * Math.log2(freq / 440) + 69);
            const semi   = ((midi % 12) + 12) % 12;
            const octave = Math.floor(midi / 12) - 1;
            return NOTE_NAMES[semi] + octave;
        }

        function noteToFreq(letter, acc, octave) {
            let semi = NOTE_BASE[letter.toUpperCase()];
            if (acc === '#' || acc === '♯') semi++;
            if (acc === 'b' || acc === '♭') semi--;
            semi = ((semi % 12) + 12) % 12;
            const midi = (octave + 1) * 12 + semi;
            return 440 * Math.pow(2, (midi - 69) / 12);
        }

        function parseInput(raw) {
            const str = raw.trim();
            if (!str) return null;
            const nm = str.match(/^([A-Ga-g])([#b♯♭]?)(\d)$/);
            if (nm) {
                const acc  = nm[2];
                const oct  = parseInt(nm[3]);
                const freq = noteToFreq(nm[1], acc, oct);
                const note = nm[1].toUpperCase() + acc.replace('♯','#').replace('♭','b') + nm[3];
                return { freq, note };
            }
            const hm = str.match(/^(\d+(?:\.\d+)?)\s*(?:[Hh][Zz])?$/);
            if (hm) {
                const freq = parseFloat(hm[1]);
                if (freq > 20 && freq < 5000) return { freq, note: freqToNote(freq) };
            }
            return null;
        }

        // ===== PITCH DETECTION =====
        // Returns { freq, clarity }. clarity is the autocorrelation peak
        // normalized by signal energy (0–1): low for noise, high for a clean
        // periodic tone. freq is -1 when there is no usable signal.
        const NO_PITCH = { freq: -1, clarity: 0 };

        function autoCorrelate(buf, sampleRate) {
            const SIZE = buf.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < RMS_GATE) return NO_PITCH;

            let r1 = 0, r2 = SIZE - 1;
            for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < 0.2) { r1 = i; break; } }
            for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(buf[SIZE - i]) < 0.2) { r2 = SIZE - i; break; } }

            const seg = buf.slice(r1, r2);
            const N   = seg.length;
            if (N < 2) return NO_PITCH;

            const c = new Float32Array(N);
            for (let i = 0; i < N; i++)
                for (let j = 0; j < N - i; j++)
                    c[i] += seg[j] * seg[j + i];

            const energy = c[0] || 1e-9;   // zero-lag energy, for normalization

            let d = 0;
            while (d < N - 1 && c[d] > c[d + 1]) d++;
            let maxVal = -Infinity, maxPos = -1;
            for (let i = d; i < N; i++) {
                if (c[i] > maxVal) { maxVal = c[i]; maxPos = i; }
            }
            if (maxPos < 1 || maxPos >= N - 1) return NO_PITCH;

            const y1 = c[maxPos - 1], y2 = c[maxPos], y3 = c[maxPos + 1];
            const a  = (y1 + y3 - 2 * y2) / 2;
            const T0 = (a !== 0) ? maxPos - (y3 - y1) / (4 * a) : maxPos;
            return { freq: sampleRate / T0, clarity: maxVal / energy };
        }

        // ===== DOM REFS =====
        const elNote    = document.getElementById('display-note');
        const elCents   = document.getElementById('display-cents');
        const elStatus  = document.getElementById('display-status');
        const elNeedle  = document.getElementById('meter-needle');
        const elStrings = document.getElementById('strings-list');
        const elBtn     = document.getElementById('listen-btn');

        // ===== CLOSEST STRING =====
        function closestString(freq) {
            let best = null, bestCents = Infinity;
            strings.forEach(s => {
                const cents = Math.abs(1200 * Math.log2(freq / s.freq));
                if (cents < bestCents) { bestCents = cents; best = s; }
            });
            return best;
        }

        // ===== DISPLAY UPDATE =====
        function updateDisplay(freq) {
            if (freq < 0) {
                elNote.textContent  = '—';
                elNote.className    = 'display-note';
                elCents.textContent = '';
                elStatus.textContent = 'Waiting for signal…';
                elStatus.className  = 'display-status';
                needlePos = 50;
                elNeedle.style.left = '50%';
                highlightString(null);
                return;
            }
            const closest = closestString(freq);
            const cents   = Math.round(1200 * Math.log2(freq / closest.freq));
            const clamped = Math.max(-50, Math.min(50, cents));
            needlePos += ((50 + clamped) - needlePos) * NEEDLE_EMA;
            elNeedle.style.left   = needlePos + '%';
            elNote.textContent    = closest.note;
            if (Math.abs(cents) <= 5) {
                elNote.className     = 'display-note in-tune';
                elCents.textContent  = 'In tune';
                elStatus.textContent = '✓ In tune';
                elStatus.className   = 'display-status in-tune';
            } else if (cents < 0) {
                elNote.className     = 'display-note';
                elCents.textContent  = `${cents} cents flat`;
                elStatus.textContent = 'Tune up ↑';
                elStatus.className   = 'display-status';
            } else {
                elNote.className     = 'display-note';
                elCents.textContent  = `+${cents} cents sharp`;
                elStatus.textContent = 'Tune down ↓';
                elStatus.className   = 'display-status';
            }
            highlightString(closest.string);
        }

        function highlightString(num) {
            document.querySelectorAll('.string-row').forEach(row => {
                row.classList.toggle('highlighted', Number(row.dataset.string) === num);
            });
        }

        // ===== RENDER STRINGS =====
        function renderStrings() {
            elStrings.innerHTML = strings.map(s => `
                <div class="string-row" data-string="${s.string}">
                    <span class="string-num">${s.string}</span>
                    <div class="string-edit">
                        <input
                            class="string-input"
                            type="text"
                            value="${s.note}"
                            aria-label="String ${s.string} pitch"
                            data-string="${s.string}"
                        />
                        <select class="string-select" aria-label="String ${s.string} note" data-string="${s.string}">
                            ${NOTE_OPTIONS_HTML}
                        </select>
                        <span class="string-hz">${s.freq.toFixed(1)} Hz</span>
                    </div>
                    <button class="string-play" data-string="${s.string}">&#9654; Play</button>
                </div>
            `).join('');

            elStrings.querySelectorAll('.string-row').forEach(row => {
                const num    = Number(row.dataset.string);
                const s      = strings.find(x => x.string === num);
                const input  = row.querySelector('.string-input');
                const sel    = row.querySelector('.string-select');
                const hzSpan = row.querySelector('.string-hz');
                const play   = row.querySelector('.string-play');

                // Set select to match current note
                const midi = noteToMidi(s.note);
                if (midi !== null) sel.value = midi;

                function commit(note, freq) {
                    s.note = note; s.freq = freq;
                    input.value  = note;
                    hzSpan.textContent = freq.toFixed(1) + ' Hz';
                    const m = noteToMidi(note);
                    if (m !== null) sel.value = m;
                }

                play.addEventListener('click', () => playTone(s.freq));

                // Mobile select
                sel.addEventListener('change', () => {
                    const opt = NOTE_OPTIONS.find(o => o.midi === parseInt(sel.value));
                    if (opt) commit(opt.note, opt.freq);
                });

                // Desktop input
                let saved = input.value;
                input.addEventListener('focus',   () => { saved = input.value; });
                input.addEventListener('keydown', e => {
                    if (e.key === 'Enter')  input.blur();
                    if (e.key === 'Escape') { input.value = saved; input.classList.remove('invalid'); input.blur(); }
                });
                input.addEventListener('input', () => {
                    const parsed = parseInput(input.value);
                    if (parsed) { hzSpan.textContent = parsed.freq.toFixed(1) + ' Hz'; input.classList.remove('invalid'); }
                    else        { input.classList.add('invalid'); }
                });
                input.addEventListener('blur', () => {
                    const parsed = parseInput(input.value);
                    if (parsed) { commit(parsed.note, parsed.freq); input.classList.remove('invalid'); }
                    else        { input.value = saved; input.classList.remove('invalid'); hzSpan.textContent = s.freq.toFixed(1) + ' Hz'; }
                });
            });
        }

        // ===== LOAD PRESET =====
        function loadPreset(name) {
            const preset = PRESETS[name];
            if (!preset) return;
            strings = preset.map(s => ({ ...s }));
            renderStrings();
        }

        // ===== LISTENING =====
        async function startListening() {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (_) {
                elStatus.textContent = 'Microphone access denied — check browser permissions.';
                return;
            }
            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') await ctx.resume();
            analyser = ctx.createAnalyser();
            analyser.fftSize = 4096;
            ctx.createMediaStreamSource(micStream).connect(analyser);
            isListening = true;
            pitchBuf = [];
            displayFreq = 0;
            needlePos = 50;
            lastValidTime = 0;
            elBtn.textContent = 'Stop Listening';
            elBtn.classList.add('active');
            loop();
        }

        function stopListening() {
            isListening = false;
            if (rafId)     { cancelAnimationFrame(rafId); rafId = null; }
            if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
            analyser = null;
            pitchBuf = [];
            displayFreq = 0;
            needlePos = 50;
            elBtn.textContent = 'Start Listening';
            elBtn.classList.remove('active');
            elNote.textContent  = '—';
            elNote.className    = 'display-note';
            elCents.textContent = '';
            elStatus.textContent = 'Click a string to play a reference tone';
            elStatus.className  = 'display-status';
            elNeedle.style.left = '50%';
            highlightString(null);
        }

        function loop() {
            if (!isListening || !analyser) return;
            const buf = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buf);
            const { freq, clarity } = autoCorrelate(buf, getAudioCtx().sampleRate);
            const now = performance.now();

            if (freq > 0 && clarity >= CLARITY_MIN) {
                // Octave-glitch folding: instruments are harmonic-rich, so a
                // frame occasionally locks an octave off. If this reading is
                // ~half or ~double the running estimate, fold it back in.
                let f = freq;
                if (pitchBuf.length >= 3) {
                    const med = median(pitchBuf);
                    if (Math.abs(f / 2 - med) / med < 0.04)      f /= 2;
                    else if (Math.abs(f * 2 - med) / med < 0.04) f *= 2;
                }
                pitchBuf.push(f);
                if (pitchBuf.length > PITCH_WINDOW) pitchBuf.shift();
                lastValidTime = now;

                // Median rejects single bad frames; EMA glides the reading.
                const med = median(pitchBuf);
                displayFreq = displayFreq ? displayFreq + (med - displayFreq) * FREQ_EMA : med;

                // Need a couple of agreeing frames before committing a note.
                if (pitchBuf.length >= 3) updateDisplay(displayFreq);
            } else if (displayFreq && now - lastValidTime < HOLD_MS) {
                // Hold the last note briefly so a momentary dropout (e.g. a
                // string decaying) doesn't make the display flicker.
                updateDisplay(displayFreq);
            } else {
                pitchBuf = [];
                displayFreq = 0;
                updateDisplay(-1);
            }
            rafId = requestAnimationFrame(loop);
        }

        // ===== EVENTS =====
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => loadPreset(btn.dataset.preset));
        });
        elBtn.addEventListener('click', () => {
            if (isListening) stopListening();
            else startListening();
        });

        // ===== INIT =====
        renderStrings();
    </script>
</body>
</html>
