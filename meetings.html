<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Activity - Rami Abi Habib</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="calendar-styles.css">
</head>
<body>
    <header>
        <h1><a href="index.html">Rami Abi Habib</a></h1>
        <p>Founder & CEO of Querio</p>
    </header>

    <main class="cal-main">
        <h2>Meeting Activity</h2>
        <p class="cal-intro">
            The unit of work for a founder is the meeting. Here's a GitHub-style
            chart of mine, pulled from my Google Calendar. Only meetings with at
            least one other person invited count.
        </p>

        <div id="content"></div>
    </main>

    <footer>
        <p><a href="index.html">&larr; Back to home</a></p>
    </footer>

    <script>
        (function () {
            var content = document.getElementById('content');

            var MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                          'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            var WEEKDAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            var DATA = null;
            var counts = {};
            var year = null;

            function esc(s) {
                return String(s == null ? '' : s)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            function ymd(d) {
                var m = d.getMonth() + 1, day = d.getDate();
                return d.getFullYear() + '-' + (m < 10 ? '0' + m : m) +
                    '-' + (day < 10 ? '0' + day : day);
            }

            function prettyDate(iso) {
                var p = iso.split('-');
                var d = new Date(+p[0], +p[1] - 1, +p[2]);
                return WEEKDAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] +
                    ' ' + d.getDate() + ', ' + d.getFullYear();
            }

            function ago(iso) {
                var then = new Date(iso).getTime();
                if (isNaN(then)) return '';
                var s = Math.max(0, Math.floor((Date.now() - then) / 1000));
                if (s < 60) return 'just now';
                var m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
                var h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
                var d = Math.floor(h / 24); if (d < 7) return d + 'd ago';
                return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
            }

            function level(c) {
                if (!c) return 0;
                if (c <= 2) return 1;
                if (c <= 5) return 2;
                if (c <= 9) return 3;
                return 4;
            }

            // Build the heatmap + summary for one calendar year.
            function renderYear() {
                var today = new Date();
                today.setHours(12, 0, 0, 0);

                var jan1 = new Date(year, 0, 1);
                var lastDay = (year === today.getFullYear())
                    ? today
                    : new Date(year, 11, 31);

                // Grid spans full weeks: back to the Sunday before Jan 1,
                // forward to the Saturday after the last day shown.
                var start = new Date(jan1);
                start.setDate(start.getDate() - start.getDay());
                var end = new Date(lastDay);
                end.setDate(end.getDate() + (6 - end.getDay()));

                var cells = '';
                var monthCols = '';
                var prevMonth = -1;
                var total = 0, days = 0, busiest = null;
                var cur = new Date(start);
                while (cur <= end) {
                    if (cur.getDay() === 0) {
                        var mLabel = '';
                        if (cur.getFullYear() === year &&
                            cur.getMonth() !== prevMonth && cur.getDate() <= 7) {
                            mLabel = MONTHS[cur.getMonth()];
                            prevMonth = cur.getMonth();
                        }
                        monthCols += '<div class="cal-month">' + mLabel + '</div>';
                    }

                    var inYear = cur >= jan1 && cur <= lastDay;
                    if (!inYear) {
                        cells += '<div class="cal-cell empty-slot"></div>';
                    } else {
                        var key = ymd(cur);
                        var c = counts[key] || 0;
                        total += c; days += 1;
                        if (!busiest || c > busiest.count) busiest = { date: key, count: c };
                        var lbl = c + (c === 1 ? ' meeting' : ' meetings') + ' on ' + prettyDate(key);
                        cells += '<div class="cal-cell l' + level(c) + '" data-date="' + key +
                            '" data-count="' + c + '" title="' + esc(lbl) + '"></div>';
                    }
                    cur.setDate(cur.getDate() + 1);
                }

                var avg = days ? (total / days).toFixed(1) : '0.0';
                var busiestHtml = (busiest && busiest.count)
                    ? 'Busiest: <strong>' + esc(prettyDate(busiest.date)) +
                      ' (' + busiest.count + ')</strong>'
                    : '';

                document.getElementById('calSummary').innerHTML =
                    '<span class="cal-total">' + total.toLocaleString() + ' meetings</span>' +
                    '<span class="cal-sub">&middot; in ' + year + ' &middot; avg ' + avg + '/day</span>' +
                    '<span class="cal-busiest">' + busiestHtml + '</span>';

                document.getElementById('calMonths').innerHTML = monthCols;
                document.getElementById('calGrid').innerHTML = cells;
                document.getElementById('calDetail').innerHTML =
                    '<span class="hint">Click any day to see how many meetings I had.</span>';
            }

            function render() {
                if (!DATA || !DATA.updated) {
                    content.innerHTML = '<p class="cal-empty">Coming soon &mdash; this syncs ' +
                        'from Google Calendar and will fill in once the first update runs.</p>';
                    return;
                }

                counts = DATA.counts || {};

                // Years to offer: whatever the data has, newest first; always
                // include the current year so it's there even early in January.
                var yearSet = {};
                (DATA.years || []).forEach(function (y) { yearSet[y] = true; });
                Object.keys(counts).forEach(function (k) { yearSet[+k.slice(0, 4)] = true; });
                yearSet[new Date().getFullYear()] = true;
                var years = Object.keys(yearSet).map(Number).sort(function (a, b) { return b - a; });
                year = years[0];

                var yearBtns = years.map(function (y) {
                    return '<button data-year="' + y + '">' + y + '</button>';
                }).join('');

                content.innerHTML =
                    '<div class="cal-summary" id="calSummary"></div>' +
                    '<div class="cal-years" id="calYears">' + yearBtns + '</div>' +
                    '<div class="cal-scroll">' +
                        '<div class="cal-months" id="calMonths"></div>' +
                        '<div class="cal-grid" id="calGrid"></div>' +
                    '</div>' +
                    '<div class="cal-legend">Less' +
                        '<span class="cal-cell l0"></span>' +
                        '<span class="cal-cell l1"></span>' +
                        '<span class="cal-cell l2"></span>' +
                        '<span class="cal-cell l3"></span>' +
                        '<span class="cal-cell l4"></span>More</div>' +
                    '<div class="cal-detail" id="calDetail"></div>' +
                    '<p class="cal-updated">Updated ' + esc(ago(DATA.updated)) + '.</p>';

                var years_el = document.getElementById('calYears');
                function markActive() {
                    [].forEach.call(years_el.querySelectorAll('button'), function (b) {
                        b.classList.toggle('active', +b.getAttribute('data-year') === year);
                    });
                }
                years_el.addEventListener('click', function (e) {
                    var btn = e.target.closest('button');
                    if (!btn) return;
                    year = +btn.getAttribute('data-year');
                    markActive();
                    renderYear();
                });

                var grid = document.getElementById('calGrid');
                grid.addEventListener('click', function (e) {
                    var cell = e.target.closest('.cal-cell[data-date]');
                    if (!cell) return;
                    var prev = grid.querySelector('.cal-cell.selected');
                    if (prev) prev.classList.remove('selected');
                    cell.classList.add('selected');
                    var n = +cell.getAttribute('data-count');
                    var when = prettyDate(cell.getAttribute('data-date'));
                    document.getElementById('calDetail').innerHTML = n
                        ? '<strong>' + esc(when) + '</strong> &mdash; ' + n +
                          (n === 1 ? ' meeting' : ' meetings')
                        : '<span class="hint">' + esc(when) + ' &mdash; no meetings</span>';
                });

                markActive();
                renderYear();
            }

            fetch('calendar-data.json?t=' + Date.now())
                .then(function (r) { return r.json(); })
                .then(function (d) { DATA = d; render(); })
                .catch(function () {
                    content.innerHTML = '<p class="cal-empty">Could not load calendar data right now.</p>';
                });
        })();
    </script>
</body>
</html>
