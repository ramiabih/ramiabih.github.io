<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Activity - Rami Abi Habib</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="calendar-styles.css">
</head>
<body>
    <header>
        <h1><a href="index.html">Rami Abi Habib</a></h1>
        <p>Founder & CEO of Querio</p>
    </header>

    <main class="cal-main">
        <h2>Meeting Activity</h2>
        <p class="cal-intro">
            The unit of work for a founder is the meeting. Here's a GitHub-style
            chart of mine, pulled from my Google Calendar. Only meetings with at
            least one other person invited count &mdash; my solo focus blocks don't
            pad the numbers.
        </p>

        <div id="content"></div>
    </main>

    <footer>
        <p><a href="index.html">&larr; Back to home</a></p>
    </footer>

    <script>
        (function () {
            var content = document.getElementById('content');

            var MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                          'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            var WEEKDAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            function esc(s) {
                return String(s == null ? '' : s)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            function ymd(d) {
                var m = d.getMonth() + 1, day = d.getDate();
                return d.getFullYear() + '-' + (m < 10 ? '0' + m : m) +
                    '-' + (day < 10 ? '0' + day : day);
            }

            function prettyDate(iso) {
                var p = iso.split('-');
                var d = new Date(+p[0], +p[1] - 1, +p[2]);
                return WEEKDAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] +
                    ' ' + d.getDate() + ', ' + d.getFullYear();
            }

            function ago(iso) {
                var then = new Date(iso).getTime();
                if (isNaN(then)) return '';
                var s = Math.max(0, Math.floor((Date.now() - then) / 1000));
                if (s < 60) return 'just now';
                var m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
                var h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
                var d = Math.floor(h / 24); if (d < 7) return d + 'd ago';
                return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
            }

            function level(c) {
                if (!c) return 0;
                if (c <= 2) return 1;
                if (c <= 5) return 2;
                if (c <= 9) return 3;
                return 4;
            }

            function render(DATA) {
                if (!DATA || !DATA.updated) {
                    content.innerHTML = '<p class="cal-empty">Coming soon &mdash; this syncs ' +
                        'from Google Calendar and will fill in once the first update runs.</p>';
                    return;
                }

                var counts = DATA.counts || {};
                var today = new Date();
                today.setHours(12, 0, 0, 0);

                // Grid starts on the Sunday on/before ~52 weeks ago.
                var start = new Date(today);
                start.setDate(start.getDate() - 364);
                start.setDate(start.getDate() - start.getDay()); // back up to Sunday

                // Grid ends on the Saturday of the current week.
                var end = new Date(today);
                end.setDate(end.getDate() + (6 - end.getDay()));

                // Build day cells (column-major: 7 cells per week column).
                var cells = '';
                var monthCols = '';
                var prevMonth = -1;
                var cur = new Date(start);
                while (cur <= end) {
                    // At the top of each week column, emit a month label slot.
                    if (cur.getDay() === 0) {
                        var mLabel = '';
                        // Label the column if its week introduces a new month.
                        if (cur.getMonth() !== prevMonth && cur.getDate() <= 7) {
                            mLabel = MONTHS[cur.getMonth()];
                            prevMonth = cur.getMonth();
                        }
                        monthCols += '<div class="cal-month">' + mLabel + '</div>';
                    }

                    if (cur > today) {
                        cells += '<div class="cal-cell empty-slot"></div>';
                    } else {
                        var key = ymd(cur);
                        var c = counts[key] || 0;
                        var label = c + (c === 1 ? ' meeting' : ' meetings') + ' on ' + prettyDate(key);
                        cells += '<div class="cal-cell l' + level(c) + '" data-date="' + key +
                            '" data-count="' + c + '" title="' + esc(label) + '"></div>';
                    }
                    cur.setDate(cur.getDate() + 1);
                }

                var busiest = DATA.busiest;
                var busiestHtml = busiest
                    ? 'Busiest: <strong>' + esc(prettyDate(busiest.date)) +
                      ' (' + busiest.count + ')</strong>'
                    : '';

                content.innerHTML =
                    '<div class="cal-summary">' +
                        '<span class="cal-total">' + DATA.total.toLocaleString() + ' meetings</span>' +
                        '<span class="cal-sub">&middot; last 12 months &middot; avg ' +
                            DATA.avg_per_day + '/day</span>' +
                        '<span class="cal-busiest">' + busiestHtml + '</span>' +
                    '</div>' +
                    '<div class="cal-scroll">' +
                        '<div class="cal-months">' + monthCols + '</div>' +
                        '<div class="cal-grid" id="calGrid">' + cells + '</div>' +
                    '</div>' +
                    '<div class="cal-legend">Less' +
                        '<span class="cal-cell l0"></span>' +
                        '<span class="cal-cell l1"></span>' +
                        '<span class="cal-cell l2"></span>' +
                        '<span class="cal-cell l3"></span>' +
                        '<span class="cal-cell l4"></span>More</div>' +
                    '<div class="cal-detail" id="calDetail">' +
                        '<span class="hint">Click any day to see how many meetings I had.</span></div>' +
                    '<p class="cal-note">Only counts meetings with at least one other person ' +
                        'invited. The page only ever sees per-day totals &mdash; no titles, ' +
                        'attendees, or anything about what the meetings actually were.</p>' +
                    '<p class="cal-updated">Updated ' + esc(ago(DATA.updated)) + '.</p>';

                var grid = document.getElementById('calGrid');
                var detail = document.getElementById('calDetail');
                var selected = null;
                grid.addEventListener('click', function (e) {
                    var cell = e.target.closest('.cal-cell[data-date]');
                    if (!cell) return;
                    if (selected) selected.classList.remove('selected');
                    selected = cell;
                    cell.classList.add('selected');
                    var n = +cell.getAttribute('data-count');
                    var when = prettyDate(cell.getAttribute('data-date'));
                    detail.innerHTML = n
                        ? '<strong>' + esc(when) + '</strong> &mdash; ' + n +
                          (n === 1 ? ' meeting' : ' meetings')
                        : '<span class="hint">' + esc(when) + ' &mdash; no meetings</span>';
                });
            }

            fetch('calendar-data.json?t=' + Date.now())
                .then(function (r) { return r.json(); })
                .then(function (d) { render(d); })
                .catch(function () {
                    content.innerHTML = '<p class="cal-empty">Could not load calendar data right now.</p>';
                });
        })();
    </script>
</body>
</html>
