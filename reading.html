<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What I Like to Read - Rami Abi Habib</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="reading-styles.css">
</head>
<body>
    <header>
        <h1><a href="index.html">Rami Abi Habib</a></h1>
        <p>Founder & CEO of Querio</p>
    </header>

    <main class="reading-main">
        <h2>What I Like to Read</h2>
        <p class="reading-intro">These are some of my favorite books that I've read.</p>
        <div class="books-grid" id="booksGrid"></div>
    </main>

    <footer>
        <p><a href="index.html">← Back to home</a></p>
    </footer>

    <script src="books.js"></script>
    <script>
        (function () {
            var grid = document.getElementById('booksGrid');

            function esc(s) {
                return String(s == null ? '' : s)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            function coverHTML(b) {
                if (b.cover) {
                    return '<div class="book-cover"><img src="' + esc(b.cover) +
                        '" alt="' + esc(b.title) + '" loading="lazy"></div>';
                }
                return '<div class="book-cover text-cover">' +
                    '<div class="tc-title">' + esc(b.title) + '</div>' +
                    '<div class="tc-author">' + esc(b.author) + '</div></div>';
            }

            (window.books || []).forEach(function (b) {
                var el = document.createElement('div');
                el.className = 'book';
                el.innerHTML = coverHTML(b) +
                    '<div class="book-meta">' +
                    '<p class="book-title">' + esc(b.title) + '</p>' +
                    '<p class="book-author">' + esc(b.author) + '</p>' +
                    '</div>';
                grid.appendChild(el);
            });
        })();
    </script>
</body>
</html>
